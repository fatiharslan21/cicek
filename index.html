<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seninle Bahar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Başlangıç: Soğuk, gri/mavi tonlar (Zor zamanlar) */
            background-color: #e0e5e9; 
            font-family: 'Georgia', serif;
            text-align: center;
            transition: background-color 1.5s ease;
            overflow: hidden;
        }

        .flower-container {
            cursor: pointer;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .flower {
            font-size: 5rem;
            display: inline-block;
            transition: all 1s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .hint {
            font-size: 0.9rem;
            color: #7a8288;
            margin-top: 20px;
            letter-spacing: 1px;
            transition: opacity 0.5s ease, color 1s ease;
            height: 20px; /* Metin değişirken sayfanın zıplamasını engeller */
        }

        .message {
            opacity: 0;
            margin-top: 30px;
            color: #5a4b4b;
            font-size: 1.2rem;
            line-height: 1.8;
            padding: 0 25px;
            transform: translateY(20px);
            transition: all 2s ease-in-out;
            pointer-events: none; /* Yanlışlıkla metne tıklanmasını engeller */
        }

        /* 1. Aşama: İlk Dokunuş (Umut yeşeriyor) */
        body.stage-1 {
            background-color: #e8ede7; /* Hafif yeşil/sıcak bir kırık beyaz */
        }
        body.stage-1 .flower {
            transform: scale(1.1);
        }
        body.stage-1 .hint {
            color: #6b7a69;
        }

        /* 2. Aşama: İkinci Dokunuş (Isınıyor) */
        body.stage-2 {
            background-color: #f5ece9; /* Hafif somon/sıcak tonlar */
        }
        body.stage-2 .flower {
            transform: scale(1.2);
        }
        body.stage-2 .hint {
            color: #8c6b6b;
        }

        /* 3. Aşama: Son Dokunuş (Çiçek açtı, bahar geldi) */
        body.stage-3 {
            background-color: #fdf5f6; /* Yumuşak, sıcak pembe */
        }
        body.stage-3 .flower {
            transform: scale(1.4) rotate(5deg);
        }
        body.stage-3 .hint {
            opacity: 0; /* İpucu kaybolur */
        }
        body.stage-3 .message {
            opacity: 1;
            transform: translateY(0); /* Mesaj yukarı doğru süzülerek gelir */
        }
    </style>
</head>
<body>

    <div class="flower-container" id="flowerContainer">
        <div class="flower" id="flowerIcon">🌱</div>
    </div>
    
    <div class="hint" id="hintText">Biraz sevgiye ihtiyacı var, dokun...</div>

    <div class="message" id="textMessage">
        Kış gibi geçen o zor zamanlar oldu,<br>
        ama sonra seni buldum...<br><br>
        Şimdi her yer bahar. 🌸
    </div>

    <script>
        const container = document.getElementById('flowerContainer');
        const flower = document.getElementById('flowerIcon');
        const hint = document.getElementById('hintText');
        const body = document.body;
        
        let tapCount = 0;

        container.addEventListener('click', () => {
            tapCount++;

            if (tapCount === 1) {
                // İlk Dokunuş
                body.classList.add('stage-1');
                flower.innerText = '🌿'; // Yapraklanır
                flower.style.opacity = 0; // Yumuşak geçiş için
                setTimeout(() => flower.style.opacity = 1, 50);
                hint.innerText = 'Güneş açıyor, bir daha dokun...';
            } 
            else if (tapCount === 2) {
                // İkinci Dokunuş
                body.classList.remove('stage-1');
                body.classList.add('stage-2');
                flower.innerText = '🌷'; // Tomurcuklanır
                flower.style.opacity = 0;
                setTimeout(() => flower.style.opacity = 1, 50);
                hint.innerText = 'Çok az kaldı...';
            } 
            else if (tapCount === 3) {
                // Üçüncü Dokunuş (Final)
                body.classList.remove('stage-2');
                body.classList.add('stage-3');
                flower.innerText = '🌸'; // Çiçek açar
                flower.style.opacity = 0;
                setTimeout(() => flower.style.opacity = 1, 50);
                
                // 3. tıklamadan sonra tıklamayı devre dışı bırakıyoruz ki başa sarmasın
                container.style.pointerEvents = 'none'; 
            }
        });
    </script>
</body>
</html>
