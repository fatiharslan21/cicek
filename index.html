<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seninle Bahar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #dbe2e6; /* Soğuk ve puslu başlangıç (Kış) */
            font-family: 'Georgia', serif;
            text-align: center;
            transition: background-color 2s ease;
            overflow: hidden;
            position: relative;
        }

        /* Çiçek ve Tıklama Alanı */
        .flower-container {
            cursor: pointer;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            animation: pulse 2.5s infinite alternate; /* Nefes alma efekti */
            z-index: 10;
        }

        .flower {
            font-size: 5rem;
            display: inline-block;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.1));
        }

        /* Dinamik Metin Alanı */
        .message-box {
            margin-top: 30px;
            height: 100px; /* Sabit yükseklik, zıplamayı önler */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .story-text {
            color: #4a5568;
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 0 30px;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .story-text.hidden {
            opacity: 0;
            transform: translateY(10px);
        }

        .hint {
            font-size: 0.85rem;
            color: #718096;
            margin-top: 15px;
            letter-spacing: 1.5px;
            font-style: italic;
            transition: opacity 0.5s ease;
        }

        /* AŞAMALARIN RENKLERİ */
        /* 1. Aşama: İlk Dokunuş (Yeşerme) */
        body.stage-1 { background-color: #e2e8e4; }
        body.stage-1 .flower { transform: scale(1.15); }
        
        /* 2. Aşama: İkinci Dokunuş (Isınma) */
        body.stage-2 { background-color: #f0e6e6; }
        body.stage-2 .flower { transform: scale(1.3); }

        /* 3. Aşama: Son Dokunuş (Bahar) */
        body.stage-3 { background-color: #fdf2f4; }
        body.stage-3 .flower { 
            transform: scale(1.5) rotate(5deg); 
            filter: drop-shadow(0px 15px 20px rgba(255, 183, 197, 0.4));
        }
        body.stage-3 .flower-container { animation: none; } /* Pulse biter */
        body.stage-3 .hint { opacity: 0; }

        /* NEFES ALMA ANİMASYONU */
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* DÜŞEN YAPRAKLAR (PETALS) ANİMASYONU */
        .petal {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 15px 0px 15px 0px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                top: -10%;
                transform: translateX(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                top: 110%;
                transform: translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="flower-container" id="flowerContainer">
        <div class="flower" id="flowerIcon">🌱</div>
    </div>
    
    <div class="message-box">
        <div class="story-text" id="storyText">
            Karanlık ve zor günlerin ortasında,<br>küçücük bir umutla başladı her şey...
        </div>
        <div class="hint" id="hintText">(Yeşertmek için dokun)</div>
    </div>

    <script>
        const container = document.getElementById('flowerContainer');
        const flower = document.getElementById('flowerIcon');
        const storyText = document.getElementById('storyText');
        const hintText = document.getElementById('hintText');
        const body = document.body;
        
        let tapCount = 0;

        // Hikaye Metinleri
        const texts = [
            "Karanlık ve zor günlerin ardıbdab,<br>beklenmedik bir anda tanışmamızla başladı her şey...", // Başlangıç (0)
            "Zorlukları geride bırakırken, yanımda olman ve yanında olmak en güzel şifaydı.<br>Birlikte iyileşmeye başladık...", // 1. Aşama
            "Zamanla o incecik bağ güçlendi.<br>İçimde sana dair çok güzel bir his büyümeye başladı...", // 2. Aşama
            "Ve şimdi kışın ve ayazın tamamen bittiğini hissediyorum...<br>İyi ki bulduk birbirimizi.<br><br>Şimdi seninle her şey ve her yer çok güzel. Seni çok seviyorum. 🌸" // 3. Aşama
        ];

        const hints = [
            "(Yeşertmek için dokun)",
            "(Isıtmak için dokun)",
            "(Çiçek açması için son bir kez...)",
            ""
        ];

        // Metin değiştirme fonksiyonu (Yumuşak geçiş ile)
        function changeText(stage) {
            storyText.classList.add('hidden');
            hintText.style.opacity = 0;
            
            setTimeout(() => {
                storyText.innerHTML = texts[stage];
                hintText.innerHTML = hints[stage];
                
                storyText.classList.remove('hidden');
                if(hints[stage] !== "") {
                    hintText.style.opacity = 1;
                }
            }, 800); // 0.8 saniye karanlıkta kalıp yeni yazıyla gelir
        }

        // Yaprak (Petal) yağdırma fonksiyonu
        function startPetalRain() {
            setInterval(() => {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                
                // Rastgele boyut, konum ve hız
                const size = Math.random() * 10 + 10; // 10px - 20px arası
                petal.style.width = `${size}px`;
                petal.style.height = `${size}px`;
                petal.style.left = `${Math.random() * 100}vw`;
                petal.style.animationDuration = `${Math.random() * 3 + 4}s`; // 4-7 saniye düşüş
                
                body.appendChild(petal);

                // Ekrandan çıkan yaprağı sil
                setTimeout(() => {
                    petal.remove();
                }, 7000);
            }, 300); // Her 300ms'de bir yeni yaprak oluştur
        }

        // Tıklama Olayı
        container.addEventListener('click', () => {
            tapCount++;

            if (tapCount === 1) {
                body.classList.add('stage-1');
                flower.innerText = '🌿';
                changeText(1);
            } 
            else if (tapCount === 2) {
                body.classList.remove('stage-1');
                body.classList.add('stage-2');
                flower.innerText = '🌷';
                changeText(2);
            } 
            else if (tapCount === 3) {
                body.classList.remove('stage-2');
                body.classList.add('stage-3');
                flower.innerText = '🌸';
                changeText(3);
                startPetalRain(); // Bahar geldi, yapraklar yağsın!
                
                // Animasyon tamamlandı, tıklamayı kapat
                container.style.pointerEvents = 'none'; 
            }
        });
    </script>
</body>
</html>
